<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Apology Letter</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:linear-gradient(135deg,#ffd6e7,#ffeef6);
font-family:Arial, Helvetica, sans-serif;
overflow:hidden;
}

/* ENVELOPE */

.envelope{
position:relative;
width:420px;
height:260px;
background:#ff9ecb;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.flap{
position:absolute;
width:0;
height:0;
border-left:210px solid transparent;
border-right:210px solid transparent;
border-bottom:130px solid #ff77b3;
top:-130px;
transform-origin:bottom;
transition:0.8s;
}

.heartSeal{
position:absolute;
top:110px;
left:50%;
transform:translateX(-50%);
font-size:40px;
}

/* LETTER */

.letter{
position:fixed;
width:85%;
max-width:900px;
height:75%;
background:white;
top:50%;
left:50%;
transform:translate(-50%,150%);
border-radius:12px;
padding:40px;
box-shadow:0 15px 40px rgba(0,0,0,0.3);
overflow:auto;
font-size:22px;
line-height:1.6;
text-align:center;
transition:1s;
}

.showLetter{
transform:translate(-50%,-50%);
}

/* BUTTON */

button{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:30px;
background:#ff4fa3;
color:white;
font-size:22px;
cursor:pointer;
}

button:hover{
background:#ff2f90;
}

/* FLOATING HEARTS */

.floatingHeart{
position:absolute;
font-size:26px;
animation:floatUp linear infinite;
opacity:0.7;
}

@keyframes floatUp{
from{transform:translateY(100vh);}
to{transform:translateY(-10vh);}
}

/* ROSE PETALS */

.petal{
position:absolute;
top:-40px;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="envelope">
<div class="flap"></div>
<div class="heartSeal">💗</div>
</div>

<div class="letter" id="letter">
<p id="text"></p>
</div>

<button onclick="openEnvelope()">Open</button>

<script>

const message = `Dear Malkin,

I heavily apologise for my behaviour in the school. Vo na jab maine apko piche baat karte suna na to mera mood off hogya tha😭😭. Sowwwryyyyy uske liyeeeee. Kal schl mai maarna hoga thppd to maar lena. Reallyyy sowwwwwwwryyyyyy cuuutuuuuuuuuu😭😭😭😙🤭🛐🫶💗. Seekh rha hun mai abhi kaise behave karte h, give me some timee. Sowwwwryyyyy once againnnn meri pyaariii gadhiiiii😭🫶.I Luuuvvvvvvvvvvvvvvvvv uhhhhhhhhhhhhhhhhhhhhhhh itttttttttttttttttttaaaaaaaaaaaaaaaa saaaaaaaaaaaraaaaaaaaaaaaaaaaaa😭🫶💗🧿😩😭!!! Ummwaaahhhhhhhhhhh😙😙😙!!!`;

/* OPEN ENVELOPE */

function openEnvelope(){

document.querySelector(".flap").style.transform="rotateX(180deg)";

setTimeout(()=>{
document.getElementById("letter").classList.add("showLetter");
typeText();
},600);

startHearts();
startPetals();
}

/* TYPING EFFECT */

function typeText(){

let i=0;
const speed=25;

function typing(){
if(i<message.length){
document.getElementById("text").innerHTML+=message.charAt(i);
i++;
setTimeout(typing,speed);
}
}

typing();
}

/* FLOATING HEARTS */

function startHearts(){

for(let i=0;i<35;i++){

let heart=document.createElement("div");
heart.className="floatingHeart";
heart.innerText="💗";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(heart);
}
}

/* ROSE PETALS RAIN */

function startPetals(){

const petals=["🌹","🌸","🌺"];

for(let i=0;i<40;i++){

let petal=document.createElement("div");
petal.className="petal";
petal.innerText=petals[Math.floor(Math.random()*petals.length)];

petal.style.left=Math.random()*100+"vw";
petal.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(petal);
}
}

</script>

</body>
</html>
